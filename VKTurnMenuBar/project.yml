name: VKTurnMenuBar
options:
  bundleIdPrefix: com.vkturnproxy.mac.agent
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.2"

settings:
  base:
    # Replace with your own Team ID (or leave blank + set CODE_SIGN_IDENTITY to
    # "-" for an ad-hoc local build). No Apple Developer account is required to
    # run this locally — it's an ordinary utility app (no Network Extension).
    DEVELOPMENT_TEAM: CDMQ33VFQC
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"

targets:
  VKTurnMenuBar:
    type: application
    platform: macOS
    sources:
      - path: VKTurnMenuBar
        # The Go engine is injected into the bundle by build_menubar.sh after
        # xcodebuild (a no-extension Mach-O isn't reliably classified as a
        # resource by xcodegen). Exclude it here so it can't land in a compile
        # phase or bloat/confuse the project.
        excludes:
          - "Resources/vk-turn-socks"
    info:
      path: VKTurnMenuBar/Info.plist
      properties:
        CFBundleDisplayName: "VK Turn Proxy Agent"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
        ITSAppUsesNonExemptEncryption: false
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vkturnproxy.mac.agent
        # Product (and thus the .app / menu title) is "VK Turn Proxy Agent"
        # rather than the target name. The packaging scripts expect this name.
        PRODUCT_NAME: "VK Turn Proxy Agent"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        # NOT sandboxed: the agent launches the bundled vk-turn-socks binary as
        # a subprocess, which the App Sandbox would block. Distribute via
        # Developer ID (or run ad-hoc locally). No entitlements file needed.
