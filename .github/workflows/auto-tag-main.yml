name: Auto tag after merge

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push next semver tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          # If HEAD already has a release tag, reuse it (safe on reruns).
          existing="$(git tag --points-at HEAD --list 'v*' | head -n 1 || true)"
          if [[ -n "${existing}" ]]; then
            echo "HEAD already tagged: ${existing}"
            echo "tag=${existing}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
          if [[ -z "${latest}" ]]; then
            next="v1.0.0"
          elif [[ "${latest}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next="v${major}.${minor}.$((patch + 1))"
          else
            echo "Latest tag '${latest}' is not semver (vX.Y.Z)."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${next}" -m "Release ${next}"
          git push origin "${next}"
          echo "Created ${next}"
          echo "tag=${next}" >> "$GITHUB_OUTPUT"
